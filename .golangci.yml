# https://golangci-lint.run/docs/configuration/file/
version: "2"

linters:
  default: all
  disable:
    - wsl
    - wsl_v5
    - depguard
    - err113
    - noinlineerr
    - nonamedreturns
    - revive
    - varnamelen
    - exhaustruct
    - tagliatelle
    - godox
    - gomodguard
    - forbidigo
  settings:
    funlen:
      lines: 150
      statements: 75
    cyclop:
      max-complexity: 25

formatters:
  enable:
    - gofmt
    - gofumpt
    - goimports
  settings:
    gofmt:
      simplify: true
    gofumpt:
      extra-rules: true
    goimports:
      local-prefixes:
        - github.com/devalv/wb-current-weather
  exclusions:
    paths:
      - ".*\\.pb\\.go"  # Exclude protobuf generated files

run:
  timeout: 5m
  tests: false
